version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: hardware_hub_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: hardware_hub_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning --requirepass redis_password123
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data: